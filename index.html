<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <title>Doraemon Interactivo</title>
</head>
<body>
    <h1 id="titulo-saludo">¡Hola!</h1>
    
    <div class="main-container">
        <div class="doraemon-interaction" id="doraemon-interaction">
            <img src="140725.png" alt="Doraemon sentado" class="doraemon-img" id="doraemon-img">
            
            <div class="stomach-hitbox" id="stomach-hitbox"></div>
            
            <div class="heart-container" id="heart-container"></div>
        </div>
        
        <div class="dorayaki-btn-container">
            <button class="dorayaki-btn" id="dorayakiBtn">
                <img src="dorayaki_sticker.png" alt="Dorayaki" class="dorayaki-icon">
            </button>
        </div>
    </div>

    <audio id="audio-estomago-1" src="estomago1.mp3"></audio>
    <audio id="audio-estomago-2" src="estomago2.mp3"></audio>
    <audio id="audio-estomago-3" src="estomago3.mp3"></audio>
    <audio id="audio-estomago-4" src="estomago4.mp3"></audio>
    
    <audio id="audio-boton" src="boton_dorayaki.mp3"></audio>
    
    <script src="script.js"></script>
</body>
</html>
